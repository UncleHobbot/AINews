services:
  ainews:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./local-data:/app/data
      - ./local-keys:/app/keys
      - ./local-logs:/app/logs
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - AllowedEmails__0=${ALLOWED_EMAIL}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
    restart: unless-stopped
